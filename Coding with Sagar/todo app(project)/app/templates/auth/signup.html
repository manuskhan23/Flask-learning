{% extends "base.html" %}
{% block title %}Signup - MyTodo{% endblock %}

{% block content %}
<div class="login-box">
    <h2>Signup</h2>
    <form method="POST">
        <div class="form-group">
            <label for="username">
                Username:
                <input type="text" id="username" name="username" required>
            </label>
        </div>
        <div class="form-group">
            <label for="email">
                Email:
                <input type="email" id="email" name="email" required>
            </label>
        </div>
        <div class="form-group">
            <label for="password">
                Password:
                <input type="password" id="password" name="password" minlength="6" required>
            </label>
        </div>
        <button type="submit" class="btn">Signup</button>
    </form>
    <p style="text-align: center; margin-top: 20px;">
        Already have an account? <a href="{{ url_for('auth.login') }}" style="color: #007bff; text-decoration: none;">Login here</a>
    </p>
</div>
{% endblock %}
